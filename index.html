<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kumpulan DartPad</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(
        135deg,
        #fff7d6,
        #ffe5ec,
        #fff0b8
    );
    min-height:100vh;
    padding:40px;
}

h1{
    text-align:center;
    color:#ff6fa5;
    margin-bottom:40px;
    font-size:2.5rem;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#ff7aa8;
    margin-bottom:15px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:15px;
}
</style>
</head>
