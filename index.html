body{

header{

}

header p{

}

.container{
    width:90%;

    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:30px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#ff6fa5;
    margin-bottom:15px;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:12px;
}

.footer{
    text-align:center;
    padding:30px;
    color:#8d6e63;
}
